<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaHD Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fda4af; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Insta<span class="text-rose-500">HD</span></h1>
            <p class="text-slate-500 text-sm font-medium">Công cụ anh viết cho bé yêu 💖</p>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <i class="fa-brands fa-instagram absolute left-4 top-3.5 text-slate-400 text-xl"></i>
                <input type="text" id="igUrl" placeholder="Dán link bài viết Instagram vào đây nà..." 
                    class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-400 focus:bg-white transition-all text-sm">
            </div>
            <button onclick="analyzeLink()" id="analyzeBtn" class="w-full bg-slate-800 text-white font-bold py-3.5 rounded-xl hover:bg-slate-900 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                <span>Gửi anh đọc</span> <i class="fa-solid fa-microchip"></i>
            </button>
        </div>

        <div id="loading" class="mt-6 text-center hidden">
            <i class="fa-solid fa-circle-notch fa-spin text-rose-500 text-3xl"></i>
            <p class="text-slate-500 mt-2 text-xs font-medium">Anh đang bóc tách album nha...</p>
        </div>

        <div id="albumArea" class="mt-6 hidden border-t border-slate-100 pt-6">
            <div id="photoGrid" class="space-y-6 max-h-[500px] overflow-y-auto pr-2 custom-scroll">
                <!-- Danh sách ảnh sẽ hiện ở đây -->
            </div>
        </div>
        
        <div id="errorMessage" class="mt-4 text-center text-red-500 text-xs font-medium hidden bg-red-50 p-3 rounded-lg border border-red-100"></div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:3000';

        async function analyzeLink() {
            const urlInput = document.getElementById('igUrl').value;
            const btn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loading');
            const albumArea = document.getElementById('albumArea');
            const photoGrid = document.getElementById('photoGrid');
            const errorMsg = document.getElementById('errorMessage');

            albumArea.classList.add('hidden');
            errorMsg.classList.add('hidden');
            photoGrid.innerHTML = '';
            btn.disabled = true;
            loading.classList.remove('hidden');

            try {
                const response = await fetch(`${BASE_URL}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();

                if(data.success && data.images) {
                    data.images.forEach((imgUrl, index) => {
                        const proxyUrl = `${BASE_URL}/api/proxy?url=` + encodeURIComponent(imgUrl);
                        const card = document.createElement('div');
                        card.className = "bg-slate-50 p-3 rounded-2xl border border-slate-200 space-y-3";
                        card.innerHTML = `
                            <div class="relative aspect-square rounded-xl overflow-hidden shadow-sm">
                                <div class="absolute top-2 left-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded font-bold z-10">ẢNH #${index + 1}</div>
                                <img src="${proxyUrl}" class="w-full h-full object-cover">
                            </div>
                            <button onclick="downloadImage('${imgUrl}', ${index + 1}, this)" class="w-full bg-rose-500 text-white font-bold py-2.5 rounded-xl hover:bg-rose-600 transition-all text-sm shadow-md">
                                <i class="fa-solid fa-download"></i> Tải tấm này về máy
                            </button>
                        `;
                        photoGrid.appendChild(card);
                    });
                    albumArea.classList.remove('hidden');
                } else {
                    errorMsg.innerText = data.error || 'Lỗi không xác định';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = 'Server VS Code chưa bật nha Anh Thư ơi!';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }

        async function downloadImage(rawUrl, index, btn) {
            const proxyUrl = `${BASE_URL}/api/proxy?url=` + encodeURIComponent(rawUrl);
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang tải...';
            btn.disabled = true;

            try {
                const response = await fetch(proxyUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `InstaHD_AnhThu_${index}_${Date.now()}.jpg`;
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (error) { alert('Lỗi tải ảnh!'); }
            finally { btn.innerHTML = originalText; btn.disabled = false; }
        }
    </script>
</body>
</html>
